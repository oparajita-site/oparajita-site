    <script>
        // ১. ভিডিও আপডেট করার জায়গা (শুধু লিঙ্ক বসাবেন)
        const videos = [
            "https://www.facebook.com/reel/901312212756034/",

        ];

        function loadMedia() {
            const vList = document.getElementById('video-list');
            const pList = document.getElementById('photo-list');

            videos.forEach(link => {
                vList.innerHTML += `<div class="card"><div class="video-wrapper"><iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(link)}&show_text=false" scrolling="no" frameborder="0" allowfullscreen="true"></iframe></div></div>`;
            });

            photos.forEach(link => {
                pList.innerHTML += `<div class="card"><iframe src="https://www.facebook.com/plugins/post.php?href=${encodeURIComponent(link)}&show_text=false" width="100%" height="450" style="border:none;overflow:hidden;border-radius:10px;" scrolling="no" frameborder="0"></iframe></div>`;
            });
        }
        loadMedia();
    </script>
